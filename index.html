<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>HATCH</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@500&display=swap');

        body {
            margin: 0;
            background-color: #FF7BAC;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #game-container {
            width: 512px;
            height: 512px;
        }

        #hatch-stats {
            width: 512px;
            min-height: 130px;
            margin-top: 10px;
            color: #ffffff;
            font-family: "Source Code Variable", "Source Code Pro", monospace;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.45;
            text-align: center;
            white-space: pre-line;
        }

        .stats-title {
            margin-bottom: 14px;
        }

        .stats-percent {
            margin-top: 14px;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <div id="hatch-stats"></div>
    <script>
        if (new URLSearchParams(window.location.search).get('previewComplete') === '1') {
            document.getElementById('hatch-stats').innerHTML = `
                <div class="stats-title">Collection Complete</div>
                <div>Your Time: 09:13</div>
                <div>Your Best: 08:57</div>
                <div class="stats-percent">Faster than 84% of players</div>
            `;
        }
    </script>
    <script src="game.js"></script>
    <script type="module" src="./firebase-score.js"></script>
</body>

</html>
